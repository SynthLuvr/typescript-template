id: no-function-declaration
language: TypeScript
rule:
  # Skip overload implementations — a `function_declaration` immediately
  # following a `function_signature` sibling. Signatures are bodyless
  # `function_signature` nodes (never matched here), and TS7010 guarantees
  # each signature set ends in exactly one implementation.
  all:
    - kind: function_declaration
    - not:
        follows:
          kind: function_signature
